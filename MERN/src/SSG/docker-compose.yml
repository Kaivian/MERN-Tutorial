version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mern_server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env.development
    networks:
      - mern-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mern_client
    ports:
      - "3000:3000"
    env_file:
      - ./client/.env.development
    networks:
      - mern-network
    depends_on:
      - server

networks:
  mern-network:
    driver: bridge
